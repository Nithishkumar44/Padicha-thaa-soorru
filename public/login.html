<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Login Page</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            perspective: 1000px;
        }
        .login-container {
            width: 350px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transform-style: preserve-3d;
            transform: rotateY(-20deg) rotateX(10deg);
            transition: transform 0.6s ease;
        }
        .login-container:hover {
            transform: rotateY(0deg) rotateX(0deg);
        }
        .login-container h2 {
            color: #fff;
            text-align: center;
            transform: translateZ(60px);
            margin-bottom: 40px;
            font-weight: 600;
            letter-spacing: 2px;
        }
        .input-group {
            position: relative;
            margin-bottom: 30px;
            transform: translateZ(40px);
            transform-style: preserve-3d;
        }
        .input-group input {
            width: 100%;
            padding: 10px 0;
            background: transparent;
            border: none;
            border-bottom: 2px solid #fff;
            outline: none;
            color: #fff;
            font-size: 16px;
            transition: 0.3s;
        }
        .input-group label {
            position: absolute;
            top: 0;
            left: 0;
            padding: 10px 0;
            font-size: 16px;
            color: #fff;
            pointer-events: none;
            transition: 0.3s;
        }
        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -20px;
            color: #03e9f4;
            font-size: 12px;
        }
        .input-group input:focus {
            border-bottom: 2px solid #03e9f4;
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #03e9f4;
            color: #000;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transform: translateZ(50px);
            transition: 0.3s;
            margin-top: 20px;
        }
        .submit-btn:hover {
            background: #fff;
            box-shadow: 0 0 15px #03e9f4, 0 0 30px #03e9f4;
            transform: translateZ(60px);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>LOGIN</h2>
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" required>
                <label>Username</label>
            </div>
            <div class="input-group">
                <input type="password" id="password" required>
                <label>Password</label>
            </div>
            <button type="submit" class="submit-btn">Sign In</button>
        </form>
        <div id="error-message" style="color: #ff4d4d; text-align: center; margin-top: 15px; display: none;"></div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (result.success) {
                    window.location.href = result.redirect; // Redirects to dashboard
                } else {
                    errorDiv.textContent = result.message;
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'An error occurred connecting to the server.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
